name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: sudo apt-get update && sudo apt-get install --yes shellcheck
      - run: python -m pip install -e '.[dev]'
      - run: ./scripts/ci.sh
